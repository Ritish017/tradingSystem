# Strategy plugin registry — Law 3 + Law 5
# Add a new strategy: create one file in app/strategies/, add one entry here.
# Zero changes to any other file required.

strategies:
  - id: opening_range_breakout
    class_name: OpeningRangeBreakoutStrategy
    module: app.strategies.rule_based.opening_range_breakout
    type: rule_based
    asset_class: india
    enabled: true
    initial_weight: 0.10
    initial_capital: 100000.0
    status: paper

